<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/" xmlns:sec="http://www.thymeleaf.org/extras/spring-security/">
<head>
<meta charset="UTF-8">
	<title>Insert title here</title>
	<title>One Time Token</title>
	<link href="/main.css" rel="stylesheet" />
</head>
<body>
	<div class="content">
	<h1 class="center">Spring Boot Tutorial</h1>
    <p th:if="${loginError}" class="error center">Wrong user or password</p>
    	<form id="ott-form" class="login-form" method="post" th:action="@{/ott/generate}">
        	<h3>Request a One-Time Token</h3>
        	<p>
          		<label for="ott-username" class="screenreader">Username</label>
          		<input type="text" id="ott-username" name="username" placeholder="Username" required>
        	</p>
        	<p>
          		<label for="ott-password" class="screenreader">Password</label>
          		<input type="password" id="ott-password" name="password" placeholder="Password" required>
        	</p>
        	<button class="primary" type="submit" form="ott-form">Send Token</button>
      	</form>
	</div> 
</body>
</html>
